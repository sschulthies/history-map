<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>History Atlas</title>
<style>
:root{--parchment:#f2dfb6;--ink:#2d2113}*{box-sizing:border-box}body{margin:0;font-family:Georgia,'Times New Roman',serif;background:#2b1d12;color:var(--ink)}.app{max-width:1280px;margin:0 auto;padding:18px}.frame{background:var(--parchment);border:8px double #5d3d1c;border-radius:12px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.45)}header{text-align:center;margin-bottom:12px}h1{font-size:clamp(2rem,5vw,4rem);margin:0;letter-spacing:4px}.subtitle{font-size:1.1rem;letter-spacing:3px;color:#7a2d22;font-weight:bold}.controls{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap}button{font-family:Georgia,'Times New Roman',serif;border:2px solid #5d3d1c;background:#f3d891;padding:10px 14px;border-radius:8px;font-weight:bold;cursor:pointer}button.active,button:hover{background:#153a5b;color:white}.grid{display:grid;grid-template-columns:1fr 320px;gap:16px}.panel{background:#f8e8c2;border:3px solid #7c5528;border-radius:10px;padding:16px}.question-box{min-height:260px}.question-box h2{margin-top:0;text-align:center;font-size:1.7rem}#targetName{color:#8d251f}.status{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center;margin:18px 0;font-size:1.2rem}.big{display:block;font-size:2rem;font-weight:bold}.feedback{min-height:52px;text-align:center;font-weight:bold;font-size:1.1rem}.correct{color:#246c2a}.incorrect{color:#9b211b}.map-card{background:#d8edf2;border:3px solid #7c5528;border-radius:10px;overflow:hidden;position:relative}svg{width:100%;height:auto;display:block}.region,.water,.river,.mountain{cursor:pointer;transition:opacity .15s ease,filter .15s ease}.region:hover,.water:hover,.river:hover,.mountain:hover{filter:brightness(1.18)}.region{stroke:#3d2a17;stroke-width:2}.water{fill:rgba(62,142,188,.22);stroke:#1f5e8c;stroke-width:2;stroke-dasharray:5 4}.river{fill:none;stroke:#1776b7;stroke-width:7;stroke-linecap:round;opacity:.85}.mountain{fill:#6b624d;stroke:#2f281c;stroke-width:2}.correct-hit{filter:brightness(1.35) saturate(1.4);stroke:#1f7a2f!important;stroke-width:5!important}.wrong-hit{filter:brightness(.9);stroke:#b32018!important;stroke-width:5!important}.label{font-size:20px;font-weight:bold;fill:#1e160e;paint-order:stroke;stroke:#f4e5bd;stroke-width:4;pointer-events:none}.small-label{font-size:15px}.water-label{font-size:20px;font-style:italic;fill:#0e5685;paint-order:stroke;stroke:#d8edf2;stroke-width:4;pointer-events:none}.legend{font-size:.95rem;line-height:1.5}.legend span{display:inline-block;width:16px;height:16px;border:1px solid #4a351d;margin-right:6px;vertical-align:middle}@media(max-width:950px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app"><div class="frame"><header><h1>HISTORY ATLAS</h1><div class="subtitle">EXPLORE · LEARN · REMEMBER</div></header><div class="controls"><button class="active" id="practiceBtn">Practice Mode</button><button id="quizBtn">Quiz Mode</button><button id="restartBtn">Restart</button></div><div class="grid"><div class="map-card"><svg viewBox="0 0 1100 720" aria-label="Europe and the Mediterranean circa 1300 AD"><rect width="1100" height="720" fill="#d8edf2"></rect>
<ellipse id="north-sea" class="water target" data-name="North Sea" cx="330" cy="170" rx="90" ry="80"></ellipse><ellipse id="norwegian-sea" class="water target" data-name="Norwegian Sea" cx="390" cy="70" rx="120" ry="50"></ellipse><ellipse id="baltic-sea" class="water target" data-name="Baltic Sea" cx="570" cy="165" rx="105" ry="45"></ellipse><ellipse id="english-channel" class="water target" data-name="English Channel" cx="250" cy="295" rx="85" ry="24"></ellipse><ellipse id="mediterranean-sea" class="water target" data-name="Mediterranean Sea" cx="520" cy="585" rx="360" ry="80"></ellipse><ellipse id="adriatic-sea" class="water target" data-name="Adriatic Sea" cx="610" cy="455" rx="38" ry="115" transform="rotate(-20 610 455)"></ellipse><ellipse id="aegean-sea" class="water target" data-name="Aegean Sea" cx="745" cy="515" rx="70" ry="65"></ellipse><ellipse id="black-sea" class="water target" data-name="Black Sea" cx="850" cy="400" rx="115" ry="65"></ellipse>
<path id="scotland" class="region target" data-name="Scotland" fill="#8c5aa0" d="M185,90 L250,85 L275,150 L235,205 L170,180 Z"></path><path id="ireland" class="region target" data-name="Ireland" fill="#5f8d4e" d="M95,145 L150,130 L175,205 L135,270 L80,235 Z"></path><path id="england" class="region target" data-name="England" fill="#b74a3e" d="M210,205 L285,200 L315,270 L275,345 L205,315 L185,250 Z"></path><path id="france" class="region target" data-name="France" fill="#345f9f" d="M260,335 L405,300 L460,385 L420,500 L275,520 L190,440 Z"></path><path id="burgundy" class="region target" data-name="Burgundy" fill="#7d3f86" d="M430,330 L500,350 L505,430 L445,455 L410,395 Z"></path><path id="holy-roman-empire" class="region target" data-name="Holy Roman Empire" fill="#d2a947" d="M450,230 L650,220 L710,350 L610,455 L505,430 L500,350 L430,330 L390,260 Z"></path><path id="denmark" class="region target" data-name="Denmark" fill="#d2693c" d="M470,175 L535,165 L560,210 L510,245 L465,220 Z"></path><path id="norway" class="region target" data-name="Norway" fill="#8352a2" d="M510,20 L590,35 L575,170 L525,160 L490,80 Z"></path><path id="sweden" class="region target" data-name="Sweden" fill="#2f77ad" d="M600,40 L680,55 L675,210 L590,205 L575,125 Z"></path><path id="poland" class="region target" data-name="Poland" fill="#c7686a" d="M670,225 L800,235 L815,340 L710,370 L650,310 Z"></path><path id="lithuania" class="region target" data-name="Lithuania" fill="#94a85a" d="M815,210 L970,230 L985,355 L825,365 L800,235 Z"></path><path id="teutonic-order" class="region target" data-name="Teutonic Order" fill="#d9d2b1" d="M700,170 L790,175 L805,230 L680,225 Z"></path><path id="hungary" class="region target" data-name="Hungary" fill="#a86f35" d="M650,370 L805,360 L850,460 L710,485 L610,455 Z"></path><path id="serbia" class="region target" data-name="Serbia" fill="#b2759b" d="M700,485 L775,470 L810,555 L720,560 Z"></path><path id="bulgaria" class="region target" data-name="Bulgaria" fill="#59875d" d="M785,470 L900,455 L905,540 L810,555 Z"></path><path id="byzantine-empire" class="region target" data-name="Byzantine Empire" fill="#7b4c91" d="M835,545 L1000,520 L1040,610 L890,650 L760,610 Z"></path><path id="portugal" class="region target" data-name="Portugal" fill="#5f8d4e" d="M105,470 L165,450 L175,610 L105,620 Z"></path><path id="castile" class="region target" data-name="Castile" fill="#d4a33e" d="M170,440 L300,450 L315,600 L175,610 L165,450 Z"></path><path id="aragon" class="region target" data-name="Aragon" fill="#cf7048" d="M305,450 L395,455 L390,580 L315,600 Z"></path><path id="papal-states" class="region target" data-name="Papal States" fill="#d9c68e" d="M520,455 L590,455 L610,535 L540,530 Z"></path><path id="venice" class="region target" data-name="Venice" fill="#4e8b7c" d="M570,405 L625,405 L610,455 L555,445 Z"></path><path id="kingdom-of-naples" class="region target" data-name="Kingdom of Naples" fill="#76519d" d="M585,535 L670,555 L705,650 L610,635 Z"></path>
<path id="islamic-world" class="region target" data-name="Islamic World" fill="#668d4c" d="M300,590 L390,580 L410,625 L330,660 L230,640 L175,610 L315,600 Z M20,615 L1080,615 L1080,720 L20,720 Z M910,405 L1090,390 L1090,660 L1000,650 L1040,610 L1000,520 L905,540 Z"></path><path id="rhine-river" class="river target" data-name="Rhine River" d="M510,250 C495,300 500,350 520,405"></path><path id="danube-river" class="river target" data-name="Danube River" d="M560,385 C650,405 735,420 860,400"></path><path id="alps" class="mountain target" data-name="The Alps" d="M405,470 L435,430 L465,475 L495,420 L530,475 L565,425 L610,480 L590,510 L520,495 L460,515 Z"></path>
<text class="label" x="205" y="265">England</text><text class="label small-label" x="180" y="150">Scotland</text><text class="label small-label" x="100" y="210">Ireland</text><text class="label" x="285" y="430">France</text><text class="label small-label" x="430" y="395">Burgundy</text><text class="label" x="490" y="325">Holy Roman</text><text class="label" x="520" y="350">Empire</text><text class="label small-label" x="480" y="205">Denmark</text><text class="label small-label" x="520" y="95">Norway</text><text class="label small-label" x="610" y="130">Sweden</text><text class="label" x="700" y="300">Poland</text><text class="label" x="835" y="300">Lithuania</text><text class="label small-label" x="705" y="205">Teutonic Order</text><text class="label" x="690" y="430">Hungary</text><text class="label small-label" x="725" y="525">Serbia</text><text class="label small-label" x="815" y="515">Bulgaria</text><text class="label" x="875" y="590">Byzantine</text><text class="label" x="895" y="615">Empire</text><text class="label small-label" x="105" y="545">Portugal</text><text class="label" x="205" y="535">Castile</text><text class="label" x="320" y="530">Aragon</text><text class="label small-label" x="535" y="500">Papal States</text><text class="label small-label" x="560" y="430">Venice</text><text class="label small-label" x="600" y="590">Naples</text><text class="label" x="510" y="675">Islamic World</text><text class="water-label" x="300" y="160">North Sea</text><text class="water-label" x="360" y="75">Norwegian Sea</text><text class="water-label" x="575" y="170">Baltic Sea</text><text class="water-label" x="190" y="300">English Channel</text><text class="water-label" x="430" y="600">Mediterranean Sea</text><text class="water-label small-label" x="600" y="480" transform="rotate(65 600 480)">Adriatic Sea</text><text class="water-label" x="705" y="545">Aegean Sea</text><text class="water-label" x="820" y="405">Black Sea</text><text class="water-label small-label" x="520" y="350" transform="rotate(85 520 350)">Rhine</text><text class="water-label small-label" x="700" y="405" transform="rotate(12 700 405)">Danube</text><text class="label" x="480" y="480">The Alps</text>
</svg></div><aside class="panel question-box"><h2 id="modeTitle">Practice Mode</h2><p style="text-align:center">Click on:</p><h2 id="targetName">Loading...</h2><div class="status"><div>Score <span class="big" id="score">0</span></div><div>Question <span class="big" id="counter">1</span></div></div><div id="feedback" class="feedback"></div><button id="nextBtn" disabled>Next Question</button><button id="skipBtn">Skip</button><hr><div class="legend"><p><span style="background:#345f9f"></span> Christian kingdoms</p><p><span style="background:#d9c68e"></span> Papal / church territories</p><p><span style="background:#7b4c91"></span> Eastern Orthodox territories</p><p><span style="background:#668d4c"></span> Islamic World</p><p><span style="background:#d8edf2"></span> Seas and water</p></div></aside></div></div></div>
<script>
const QUESTIONS=[["England","england"],["Scotland","scotland"],["Ireland","ireland"],["France","france"],["Burgundy","burgundy"],["Holy Roman Empire","holy-roman-empire"],["Portugal","portugal"],["Castile","castile"],["Aragon","aragon"],["Papal States","papal-states"],["Venice","venice"],["Kingdom of Naples","kingdom-of-naples"],["Poland","poland"],["Lithuania","lithuania"],["Teutonic Order","teutonic-order"],["Hungary","hungary"],["Serbia","serbia"],["Bulgaria","bulgaria"],["Byzantine Empire","byzantine-empire"],["Islamic World","islamic-world"],["North Sea","north-sea"],["Norwegian Sea","norwegian-sea"],["Baltic Sea","baltic-sea"],["English Channel","english-channel"],["Mediterranean Sea","mediterranean-sea"],["Adriatic Sea","adriatic-sea"],["Aegean Sea","aegean-sea"],["Black Sea","black-sea"],["Rhine River","rhine-river"],["Danube River","danube-river"],["The Alps","alps"],["the Muslim-controlled territories, including southern Spain and North Africa","islamic-world"],["the duchy important in the Hundred Years' War","burgundy"],["the empire centered in Constantinople","byzantine-empire"],["the major river flowing through central Europe toward the Black Sea","danube-river"]];
let deck=[],current=null,score=0,counter=0,answered=false,quizMode=false;const targetName=document.getElementById('targetName'),feedback=document.getElementById('feedback'),scoreEl=document.getElementById('score'),counterEl=document.getElementById('counter'),nextBtn=document.getElementById('nextBtn'),skipBtn=document.getElementById('skipBtn'),restartBtn=document.getElementById('restartBtn'),practiceBtn=document.getElementById('practiceBtn'),quizBtn=document.getElementById('quizBtn'),modeTitle=document.getElementById('modeTitle');function shuffle(arr){return[...arr].sort(()=>Math.random()-.5)}function clearMarks(){document.querySelectorAll('.target').forEach(el=>{el.classList.remove('correct-hit','wrong-hit')})}function start(mode='practice'){quizMode=mode==='quiz';deck=shuffle(QUESTIONS);score=0;counter=0;modeTitle.textContent=quizMode?'Quiz Mode':'Practice Mode';practiceBtn.classList.toggle('active',!quizMode);quizBtn.classList.toggle('active',quizMode);nextQuestion()}function nextQuestion(){clearMarks();feedback.textContent='';feedback.className='feedback';answered=false;nextBtn.disabled=true;if(deck.length===0)deck=shuffle(QUESTIONS);current=deck.pop();counter++;targetName.textContent=current[0];scoreEl.textContent=score;counterEl.textContent=counter}function handleClick(e){if(answered)return;const clicked=e.currentTarget.id,correct=current[1];answered=true;if(clicked===correct){score++;e.currentTarget.classList.add('correct-hit');feedback.textContent='Correct.';feedback.className='feedback correct'}else{e.currentTarget.classList.add('wrong-hit');document.getElementById(correct).classList.add('correct-hit');feedback.textContent='Not quite. The correct answer is highlighted.';feedback.className='feedback incorrect'}scoreEl.textContent=score;nextBtn.disabled=false}document.querySelectorAll('.target').forEach(el=>el.addEventListener('click',handleClick));nextBtn.addEventListener('click',nextQuestion);skipBtn.addEventListener('click',nextQuestion);restartBtn.addEventListener('click',()=>start(quizMode?'quiz':'practice'));practiceBtn.addEventListener('click',()=>start('practice'));quizBtn.addEventListener('click',()=>start('quiz'));start('practice');
</script></body></html>
